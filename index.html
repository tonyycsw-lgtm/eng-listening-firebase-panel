<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>英語聽力練習 (Firebase) </title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            line-height: 1.5;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* 側邊欄 */
        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e9eef3;
            padding: 1.5rem 1rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .logo-area {
            margin-bottom: 1.5rem;
            padding-left: 0.75rem;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1E3A8A, #3B82F6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-sub {
            font-size: 0.7rem;
            color: #64748b;
            margin-top: 4px;
        }

        /* 用戶資訊 */
        .user-section {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid #eef2ff;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #e2e8f0;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e293b;
        }

        .user-email {
            font-size: 0.7rem;
            color: #64748b;
        }

        .user-role {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 20px;
            background: #eef2ff;
            color: #1E3A8A;
            display: inline-block;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px;
        }

        .logout-btn:hover {
            color: #ef4444;
        }

        .nav-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 0.8rem;
            padding-left: 0.75rem;
        }

        .book-item {
            margin-bottom: 0.5rem;
        }

        .book-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 0.75rem;
            border-radius: 12px;
            font-weight: 600;
            color: #1E3A8A;
            background: #eef2ff;
            margin-bottom: 0.25rem;
            cursor: pointer;
        }

        .book-header i {
            width: 24px;
        }

        .chapter-list {
            margin-left: 1.5rem;
            margin-bottom: 0.5rem;
            display: none;
        }

        .chapter-list.show {
            display: block;
        }

        .chapter-item {
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
            color: #475569;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin-top: 2px;
        }

        .chapter-item:hover {
            background: #f1f5f9;
        }

        .chapter-item.active {
            background: #eef2ff;
            color: #1E3A8A;
        }

        .practice-list {
            margin-left: 1.5rem;
            margin-top: 0.2rem;
            margin-bottom: 0.5rem;
            display: none;
        }

        .practice-list.show {
            display: block;
        }

       /* ==================== 側邊欄練習項目樣式 ==================== */

.practice-link {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    padding: 8px 12px;
    margin: 2px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 13px;
    color: #334155;
}

/* 練習文字區域 */
.practice-link span:first-child {
    flex: 1;
    word-break: break-word;
    white-space: normal;
    line-height: 1.4;
}

/* 徽章區域 */
.practice-badge {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 500;
    text-align: right;
    white-space: nowrap;
}

/* 懸停效果 */
.practice-link:hover {
    background-color: #f1f5f9;
}

/* 當前激活的練習 */
.practice-link.active {
    background-color: #eef2ff;
    color: #1E3A8A;
}

.practice-link.active .practice-badge {
    color: #1E3A8A;
}

        .main-content {
            flex: 1;
            padding: 2rem;
            min-width: 0;
        }

        .exercise-header {
            margin-bottom: 1.5rem;
        }

        .title-section h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #0f172a;
        }

        .title-section p {
            color: #5b6e8c;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* 題目區域 */
        .questions-area {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 30px -12px rgba(0,0,0,0.1);
            border: 1px solid #eef2ff;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .question-item {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #f0f2f5;
            transition: background 0.2s ease;
        }

        .question-item.playing-highlight {
            background: #f1f5f9;
            border-left: 4px solid #1E3A8A;
        }

        .question-item.waiting-answer {
            background: #fefce8;
            border-left: 4px solid #f59e0b;
        }

        .question-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 0.8rem;
        }

        .q-num {
            background: #eef2ff;
            width: 24px;
            height: 24px;
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #1E3A8A;
            flex-shrink: 0;
        }

        .question-text {
            font-weight: 600;
            font-size: 0.9rem;
            flex: 1;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-left: 2rem;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 10px;
            border-radius: 10px;
            transition: background 0.15s;
        }

        .option-row label {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .option-row.correct-highlight {
            background: #e6f7e6;
        }

        .option-row.wrong-highlight {
            background: #ffe6e6;
        }

        .option-status {
            margin-left: 0px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .explain-icon {
            margin-left: 0px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #f59e0b;
            transition: all 0.2s;
            background: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .explain-icon:hover {
            background: #fef9e3;
            transform: scale(1.1);
        }

        input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #1E3A8A;
        }

  .explanation-area {
    margin-top: 12px;
    margin-left: 28px;
    padding: 12px;
    background-color: #f8fafc;
    border-radius: 8px;
    font-size: 13px;
    color: #334155;
    display: none;
    width: calc(100% - 28px);
}

.explanation-area.show {
    display: block;
}

        .action-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1rem 0;
            align-items: center;
        }

        .btn-primary {
            background: #1E3A8A;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-secondary {
            background: white;
            border: 1px solid #cbd5e1;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .score-badge {
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #94a3b8;
        }

        /* ========== 懸浮視窗樣式 ========== */
        .floating-player {
            position: fixed;
            min-width: 280px;
            width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            border: 1px solid #eef2ff;
            z-index: 1000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: auto;
        }

        /* 圓點最小化 */
        .floating-player.minimized {
            width: 56px !important;
            height: 56px !important;
            min-width: 56px;
            min-height: 56px;
            border-radius: 28px;
            overflow: hidden;
            cursor: pointer;
        }

        .floating-player.minimized .floating-header {
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating-player.minimized .floating-header h3 {
            display: none;
        }

        .floating-player.minimized .floating-header-btns {
            display: none;
        }

        .floating-player.minimized .mini-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 1.8rem;
            color: white;
        }

        .floating-player.minimized .floating-content {
            display: none;
        }

        .floating-player.minimized .resize-handle {
            display: none;
        }

        /* 控制最小化（無文字容器） */
        .floating-player.control-minimized {
            height: 120px !important;
            overflow: hidden;
        }

        .floating-player.control-minimized .floating-english,
        .floating-player.control-minimized .floating-chinese {
            display: none;
        }

        .floating-player.control-minimized .floating-content {
            padding: 8px 12px;
            overflow: hidden;
        }

        .floating-player.control-minimized .resize-handle {
            display: none;
        }

        /* 正常狀態隱藏 mini-icon */
        .mini-icon {
            display: none;
        }

        .floating-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #1E3A8A;
            color: white;
            cursor: move;
            user-select: none;
            flex-shrink: 0;
        }

        .floating-header h3 {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .floating-header-btns {
            display: flex;
            gap: 6px;
        }

        .floating-header-btns button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }

        .floating-header-btns button:hover {
            background: rgba(255,255,255,0.4);
        }

        .floating-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: hidden;
            transition: all 0.2s;
        }

        .floating-controls {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-shrink: 0;
        }

        .float-control-btn {
            background: #f1f5f9;
            border: none;
            width: 52px;
            height: 52px;
            border-radius: 52px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .float-control-btn.primary {
            background: #1E3A8A;
            color: white;
        }
        .float-control-btn.primary:hover { background: #2563eb; }
        .float-control-btn:hover { background: #e2e8f0; }

        .floating-english {
            background: #f8fafc;
            padding: 14px 16px;
            border-radius: 16px;
            border-left: 4px solid #1E3A8A;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .floating-english.hidden {
            display: none;
        }

        .floating-role {
            font-size: 0.9rem;
            font-weight: 600;
            color: #1E3A8A;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .floating-text {
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            color: #1e293b;
            line-height: 1.5;
            font-weight: 500;
        }

        .floating-chinese {
            background: #fef9e3;
            padding: 12px 16px;
            border-radius: 16px;
            border-left: 3px solid #f59e0b;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .floating-chinese.hidden {
            display: none;
        }

        .floating-trans-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #f59e0b;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .floating-trans-text {
            font-size: clamp(0.8rem, 2.3vw, 1rem);
            color: #78350f;
            line-height: 1.4;
        }

        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 20px;
            height: 20px;
            cursor: nw-resize;
            background: linear-gradient(135deg, transparent 50%, #cbd5e1 50%);
            border-bottom-right-radius: 20px;
            z-index: 10;
        }
        .resize-handle:hover {
            background: linear-gradient(135deg, transparent 50%, #1E3A8A 50%);
        }

        /* 隱藏的單元選擇器（用於兼容性） */
        #unit-select {
            display: none;
        }

        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 1rem;
            }
            .main-content {
                padding: 1rem;
            }
            .options {
                padding-left: 1rem;
            }
            .floating-player {
                width: 320px;
            }
            .float-control-btn {
                width: 44px;
                height: 44px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="logo-area">
            <div class="logo">🎧 英語聽力練習</div>
        </div>

        <!-- 用戶資訊區 -->
        <div class="user-section" id="userSection">
            <div class="user-info">
                <div class="user-details" id="userDetails">
                    <span>載入中...</span>
                </div>
                <button class="logout-btn" id="logoutBtn" style="display: none;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <!-- 管理員工具容器 -->
        <div id="adminToolsContainer"></div>

        <div class="nav-section-title">教材</div>
        <div id="booksContainer"></div>
    </aside>

    <main class="main-content">
        <div class="exercise-header">
            <div class="title-section">
                <h1 id="practice-title">載入中...</h1>
                <p id="practice-desc"></p>
            </div>
        </div>

        <div id="questionsContainer" class="questions-area"></div>

        <div class="action-bar">
            <button id="checkBtn" class="btn-primary"><i class="fas fa-check-circle"></i> 答案</button>
            <button id="resetBtn" class="btn-secondary"><i class="fas fa-undo-alt"></i> 重置</button>
            <div id="scoreDisplay" class="score-badge">📊</div>
        </div>
        <footer>✨ 可拖曳懸浮視窗 · 可縮放大小 · 盲聽模式 · 中文翻譯 · 作答後自動繼續</footer>
    </main>
</div>

<!-- 隱藏的單元選擇器（用於兼容性） -->
<select id="unit-select" style="display: none;"></select>

<!-- 懸浮視窗 -->
<div id="floatingPlayer" class="floating-player minimized" style="bottom: 20px; right: 20px;">
    <div class="floating-header" id="floatingHeader">
        <h3><i class="fas fa-headphones"></i> 聆聽</h3>
        <div class="floating-header-btns">
            <button id="toggleTranslationBtn" title="顯示/隱藏中文翻譯"><i class="fas fa-language"></i></button>
            <button id="toggleTextBtn" title="隱藏文字 (盲聽模式)"><i class="fas fa-font"></i></button>
            <button id="minimizeFloatBtn" title="最小化"><i class="fas fa-minus"></i></button>
        </div>
        <div class="mini-icon"><i class="fas fa-headphones"></i></div>
    </div>
    <div class="floating-content">
        <div class="floating-controls">
            <button id="floatPrevBtn" class="float-control-btn"><i class="fas fa-backward-step"></i></button>
            <button id="floatPlayBtn" class="float-control-btn primary"><i class="fas fa-play"></i></button>
            <button id="floatNextBtn" class="float-control-btn"><i class="fas fa-forward-step"></i></button>
        </div>
        
        <div class="floating-english" id="floatingEnglish">
            <div class="floating-role" id="floatRole"><i class="fas fa-microphone-alt"></i> 主持人</div>
            <div class="floating-text" id="floatText">點擊播放開始</div>
        </div>
        
        <div class="floating-chinese" id="floatingChinese" style="display: none;">
            <div class="floating-trans-label"><i class="fas fa-language"></i> 翻譯</div>
            <div class="floating-trans-text" id="floatTranslationText"></div>
        </div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
